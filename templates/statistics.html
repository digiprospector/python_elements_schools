<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>答题统计 - 数学题库</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>答题统计</h1>
            <div class="nav">
                <a href="/" class="btn-secondary">返回首页</a>
                <a href="/practice" class="btn">继续练习</a>
            </div>
        </div>

        <div class="section">
            <div id="stats-container">
                <div class="stats-card">
                    <h3>用户信息</h3>
                    <p>用户名: <strong id="username"></strong></p>
                </div>

                <div class="stats-grid">
                    <div class="stats-card">
                        <div class="stats-number" id="total-answers">0</div>
                        <div class="stats-label">总答题数</div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-number correct" id="correct-answers">0</div>
                        <div class="stats-label">正确数</div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-number wrong" id="wrong-answers">0</div>
                        <div class="stats-label">错误数</div>
                    </div>
                    <div class="stats-card">
                        <div class="stats-number" id="accuracy">0%</div>
                        <div class="stats-label">正确率</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 加载统计数据
        fetch('/api/get_statistics')
        .then(res => res.json())
        .then(data => {
            if (data.success) {
                const stats = data.statistics;
                document.getElementById('username').textContent = stats.username;
                document.getElementById('total-answers').textContent = stats.total_answers;
                document.getElementById('correct-answers').textContent = stats.correct_count;
                document.getElementById('wrong-answers').textContent = stats.wrong_count;
                document.getElementById('accuracy').textContent = stats.accuracy + '%';
            } else {
                alert('请先登录');
                location.href = '/';
            }
        });
    </script>
</body>
</html>
